{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h1 class="mb-4 text-center">Авторизация</h1>

            <!-- Форма авторизации -->
            <div class="card mb-4">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Имя пользователя</label>
                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username"
                                   placeholder="Введите имя пользователя"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password"
                                   placeholder="Введите пароль"
                                   required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Войти</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Отображение параметров формы после отправки -->
            {% if form_data %}
            <div class="card border-success">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Параметры формы (отправленные данные)</h5>
                </div>
                <div class="card-body">
                    <table class="table table-bordered mb-0">
                        <thead>
                            <tr>
                                <th>Поле</th>
                                <th>Значение</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><code>username</code></td>
                                <td>{{ form_data.username }}</td>
                            </tr>
                            <tr>
                                <td><code>password</code></td>
                                <td>{{ form_data.password }}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            {% endif %}

        </div>
    </div>
</div>
{% endblock %}
