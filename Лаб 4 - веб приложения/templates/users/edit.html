{% extends 'base.html' %}
{% from 'users/macros.html' import user_form %}
{% block content %}
<h1 class="mb-4">Редактирование пользователя</h1>
<form method="POST" class="w-50">
    {{ user_form(form_data, roles, field_errors, is_create=False) }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('users_index') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
