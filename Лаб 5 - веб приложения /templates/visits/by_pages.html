{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">Отчёт по страницам</h1>
<table class="table table-bordered w-75">
    <thead class="table-dark">
        <tr><th>№</th><th>Страница</th><th>Количество посещений</th></tr>
    </thead>
    <tbody>
    {% for row in rows %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ row['path'] }}</td>
            <td>{{ row['cnt'] }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('visits.by_pages_export') }}" class="btn btn-success">
    Экспорт в CSV
</a>
{% endblock %}
